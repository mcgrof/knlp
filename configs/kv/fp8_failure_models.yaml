# FP8 KV-cache failure atlas -- model registry.
#
# `where` is the placement decision from the cost analysis: `local` runs on the prune W7900 (48 GB),
# `device_map` needs CPU offload (>24 GB families), `pod` is the only hard cloud dependency.
# `expected` is the PRIOR failure class (to be confirmed, never assumed) so a surprise is visible.
# Tiers follow the brief: A = primary failure/control set, B = scale + family breadth, C =
# historical / generalization holdouts.

defaults:
  dtype: bfloat16
  revision: main
  trust_remote_code: false

tiers:
  A:  # primary mechanism + control set (must run)
    - {id: Qwen/Qwen2.5-7B,            family: qwen2,   where: local,      expected: bias_induced,  k_bias: true}
    - {id: Qwen/Qwen2-7B,              family: qwen2,   where: local,      expected: bias_induced,  k_bias: true}
    - {id: microsoft/phi-2,            family: phi,     where: local,      expected: mixed_subspace, k_bias: true, partial_rope: true}
    - {id: meta-llama/Llama-3.1-8B,    family: llama,   where: local,      expected: tolerant,      k_bias: false}  # biasless control (gated, accessible)
    - {id: mistralai/Mistral-7B-v0.3,  family: mistral, where: local,      expected: tolerant,      k_bias: false}

  B:  # scale + family breadth
    - {id: Qwen/Qwen2.5-1.5B,          family: qwen2,   where: local,      expected: bias_induced,  k_bias: true}
    - {id: Qwen/Qwen2.5-3B,            family: qwen2,   where: local,      expected: bias_induced,  k_bias: true}
    - {id: Qwen/Qwen2.5-14B,           family: qwen2,   where: local,      expected: bias_induced,  k_bias: true}
    - {id: Qwen/Qwen3-4B,              family: qwen3,   where: local,      expected: unknown,       k_bias: false, qk_norm: true}
    - {id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B, family: qwen2, where: local, expected: bias_induced, k_bias: true}
    - {id: microsoft/phi-4,            family: phi,     where: local,      expected: unknown,       fused_qkv: true}
    - {id: google/gemma-2-9b,          family: gemma2,  where: local,      expected: unknown,       k_bias: false}  # download

  C:  # historical / generalization holdouts (partial-RoPE legacy + large)
    - {id: EleutherAI/pythia-410m,     family: gptneox, where: local,      expected: unknown,       partial_rope: true}
    - {id: EleutherAI/pythia-6.9b,     family: gptneox, where: local,      expected: unknown,       partial_rope: true}
    - {id: EleutherAI/gpt-neox-20b,    family: gptneox, where: device_map, expected: unknown,       partial_rope: true}
    - {id: EleutherAI/gpt-j-6b,        family: gptj,    where: local,      expected: unknown,       partial_rope: true}  # download
    - {id: Qwen/Qwen2.5-72B,           family: qwen2,   where: pod,        expected: bias_induced,  k_bias: true}  # H200 device_map, ~$5

# Models cached locally on prune (skip download); anything else needs a pull or a pod.
cached_on_prune:
  - Qwen/Qwen2.5-1.5B
  - Qwen/Qwen2.5-3B
  - Qwen/Qwen2.5-7B
  - Qwen/Qwen2.5-14B
  - Qwen/Qwen2-7B
  - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
  - microsoft/phi-2
  - microsoft/phi-4
  - mistralai/Mistral-7B-v0.3
  - Qwen/Qwen3-4B
  - EleutherAI/pythia-410m
  - EleutherAI/pythia-6.9b
  - EleutherAI/gpt-neox-20b
