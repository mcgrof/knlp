# Target models for the K-projection-bias / FP8-sensitivity audit.
# expected_bias_status / expected_k_sensitivity are PRIORS to test, NOT assumptions the code
# may use -- every script discovers the actual bias from config + state_dict. tier: w7900 fits
# on the 48GB W7900 (<=14B BF16); tier: large needs H200/CPU-offload (deferred, second-tier).
models:
  # --- sensitive / positive targets (paper: fragile keys) ---
  - model_id: Qwen/Qwen2.5-1.5B-Instruct
    short_name: qwen25-1.5b
    expected_bias_status: "true"
    expected_k_sensitivity: sensitive
    tested_in_paper: true
    tier: w7900
    notes: "Qwen2 QKV bias; paper error ratio high at small scale"
  - model_id: Qwen/Qwen2.5-7B-Instruct
    short_name: qwen25-7b
    expected_bias_status: "true"
    expected_k_sensitivity: sensitive
    tested_in_paper: true
    tier: w7900
    notes: "primary sensitive positive; paper error ratio 5.40 @7B"
  - model_id: Qwen/Qwen2-7B
    short_name: qwen2-7b
    expected_bias_status: "true"
    expected_k_sensitivity: sensitive
    tested_in_paper: false
    tier: w7900
    notes: "Qwen2 (pre-2.5) 7B; bias lineage"
  - model_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    short_name: dsr1-qwen-7b
    expected_bias_status: "true"
    expected_k_sensitivity: sensitive
    tested_in_paper: true
    tier: w7900
    notes: "distilled from Qwen2.5-7B; inherits key fragility (2504.04823)"
  # --- biased but tolerant / attenuation controls ---
  - model_id: Qwen/Qwen2.5-3B-Instruct
    short_name: qwen25-3b
    expected_bias_status: "true"
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "biased but tolerant in the paper scale sweep"
  - model_id: Qwen/Qwen2.5-14B
    short_name: qwen25-14b
    expected_bias_status: "true"
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "biased tolerant; base (Instruct not cached). attenuation control"
  - model_id: Qwen/Qwen2.5-72B-Instruct
    short_name: qwen25-72b
    expected_bias_status: "true"
    expected_k_sensitivity: attenuated
    tested_in_paper: true
    tier: large
    notes: "large biased attenuation case; paper error ratio drops 5.40->1.10 @72B"
  - model_id: microsoft/phi-2
    short_name: phi-2
    expected_bias_status: "true"
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "Phi-2 has QKV bias; tolerant -> bias-alone-insufficient control"
  - model_id: microsoft/phi-4
    short_name: phi-4
    expected_bias_status: unknown
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "14B; verify fused-vs-separate qkv + bias at runtime"
  # --- no-bias / likely no-bias controls ---
  - model_id: meta-llama/Llama-3.1-8B-Instruct
    short_name: llama31-8b
    expected_bias_status: "false"
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "no QKV bias -> pre-bias mode must be a no-op (control)"
  - model_id: mistralai/Mistral-7B-Instruct-v0.3
    short_name: mistral-7b
    expected_bias_status: "false"
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "no QKV bias control"
  - model_id: Qwen/Qwen3-8B
    short_name: qwen3-8b
    expected_bias_status: unknown
    expected_k_sensitivity: tolerant
    tested_in_paper: true
    tier: w7900
    notes: "Qwen3 added QK-norm and may have DROPPED the Qwen2 bias -- VERIFY"
