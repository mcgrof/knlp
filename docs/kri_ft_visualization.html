<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRI-FT: Training a Model to Tolerate KV-Cache Routing</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@16.14.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@16.14.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@1.8.5/umd/Recharts.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .gradient-text {
      background: linear-gradient(135deg, #f59e0b, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card { background: linear-gradient(145deg, #1e293b, #1a2332); border: 1px solid #334155; transition: all 0.3s ease; }
    .card:hover { border-color: #10b981; box-shadow: 0 4px 20px -5px rgba(16, 185, 129, 0.2); }
    .tab-active { background: #10b981; color: #0f172a; font-weight: 600; }
    .tab-inactive { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .tab-inactive:hover { border-color: #10b981; color: #10b981; }
    .stat-card { background: linear-gradient(145deg, #1e293b, #1a2332); border: 1px solid #334155; }
  </style>
</head>
<body class="min-h-screen text-gray-100">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const {
      LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
      Tooltip, Legend, ResponsiveContainer, ReferenceLine, Cell
    } = Recharts;

    const C = { vanilla: '#64748b', dense: '#3b82f6', krift: '#10b981', accent: '#f59e0b', red: '#ef4444' };

    const DATA = {
      routing: {
        recent: [
          {r: 12.1, Vanilla: 843.49, 'Dense-FT': 810.84, 'KRI-FT': 109.95},
          {r: 23.4, Vanilla: 379.23, 'Dense-FT': 364.14, 'KRI-FT': 60.03},
          {r: 43.8, Vanilla: 125.31, 'Dense-FT': 122.95, 'KRI-FT': 34.25},
          {r: 75.0, Vanilla: 21.11, 'Dense-FT': 20.76, 'KRI-FT': 18.23}
        ],
        sink_recent: [
          {r: 12.1, Vanilla: 13.63, 'Dense-FT': 13.50, 'KRI-FT': 12.19},
          {r: 23.4, Vanilla: 10.97, 'Dense-FT': 10.86, 'KRI-FT': 10.27},
          {r: 43.8, Vanilla: 10.17, 'Dense-FT': 10.08, 'KRI-FT': 9.66},
          {r: 75.0, Vanilla: 9.62, 'Dense-FT': 9.51, 'KRI-FT': 9.52}
        ],
        kri: [
          {r: 24.8, Vanilla: 12.85, 'Dense-FT': 12.88, 'KRI-FT': 10.61},
          {r: 37.6, Vanilla: 11.56, 'Dense-FT': 11.57, 'KRI-FT': 9.90},
          {r: 73.0, Vanilla: 10.08, 'Dense-FT': 10.02, 'KRI-FT': 9.59},
          {r: 86.6, Vanilla: 9.67, 'Dense-FT': 9.56, 'KRI-FT': 9.55}
        ]
      },
      bmin: [
        {L: '256', Vanilla: 16, 'Dense-FT': 16, 'KRI-FT': 4},
        {L: '512', Vanilla: 14, 'Dense-FT': 14, 'KRI-FT': 3},
        {L: '1024', Vanilla: 8, 'Dense-FT': 8, 'KRI-FT': 1}
      ],
      canonical: [
        {router: 'KRI-Q', Vanilla: 0.1138, 'Dense-FT': 0.0947, 'KRI-FT': 0.0199},
        {router: 'KRI-Q-window', Vanilla: 0.1188, 'Dense-FT': 0.0988, 'KRI-FT': 0.0204},
        {router: 'KRI-G', Vanilla: 0.0536, 'Dense-FT': 0.0347, 'KRI-FT': 0.0184},
        {router: 'kv-sum', Vanilla: 0.1287, 'Dense-FT': 0.1105, 'KRI-FT': 0.0222}
      ],
      memfwd: [
        {model: 'Vanilla', excess: 2.47, color: C.vanilla},
        {model: 'Dense-FT', excess: 2.52, color: C.dense},
        {model: 'KRI-FT', excess: -0.57, color: C.krift}
      ],
      narrowing: [
        {base: 'GPT-2 small (124M)', 'KL reduction %': 82.5},
        {base: 'SmolLM2-360M (RoPE+GQA)', 'KL reduction %': 20}
      ]
    };

    function StatCard({label, value, unit, sub}) {
      return (
        <div className="stat-card rounded-lg p-4 text-center">
          <div className="text-gray-500 text-xs uppercase tracking-wide mb-1">{label}</div>
          <div className="text-2xl font-bold text-white">{value}<span className="text-sm text-gray-400 ml-1">{unit}</span></div>
          {sub && <div className="text-xs text-gray-500 mt-1">{sub}</div>}
        </div>
      );
    }

    function CustomTooltip({active, payload, label}) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div className="bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm">
          <div className="text-gray-400 mb-1">{label}</div>
          {payload.map((p, i) => (
            <div key={i} style={{color: p.color}}>{p.name}: <strong>{typeof p.value === 'number' ? p.value.toLocaleString() : p.value}</strong></div>
          ))}
        </div>
      );
    }

    function RoutingChart() {
      const [policy, setPolicy] = useState('recent');
      const opts = {recent: 'recent only', sink_recent: 'sink + recent', kri: 'KRI (Q+N)'};
      const data = DATA.routing[policy];
      return (
        <div className="card rounded-xl p-6 mb-6">
          <div className="flex justify-between items-center mb-1 flex-wrap gap-2">
            <h3 className="text-lg font-semibold">Perplexity vs Actual KV Retention</h3>
            <div className="flex gap-2">
              {Object.entries(opts).map(([k, v]) => (
                <button key={k} className={`px-3 py-1 rounded text-xs ${policy === k ? 'tab-active' : 'tab-inactive'}`} onClick={() => setPolicy(k)}>{v}</button>
              ))}
            </div>
          </div>
          <p className="text-gray-500 text-sm mb-4">GPT-2 small. X is the <em>actual</em> retained-KV fraction (the honest axis). Y is log perplexity. Under naive recent-only routing KRI-FT is 6.3× lower than vanilla at ~23% retention; the gap shrinks under sink+recent, where the model — not the router — is what KRI-FT fixed.</p>
          <ResponsiveContainer width="100%" height={360}>
            <LineChart data={data} margin={{top: 8, right: 16, left: 24, bottom: 28}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="r" stroke="#94a3b8" height={50} tickMargin={8} label={{value: 'Actual KV retention (%)', position: 'insideBottom', offset: -4, fill: '#94a3b8'}} />
              <YAxis stroke="#94a3b8" width={64} scale="log" domain={[8, 1000]} allowDataOverflow label={{value: 'Perplexity (log)', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <Tooltip content={CustomTooltip} />
              <Legend verticalAlign="top" wrapperStyle={{paddingBottom: 10}} />
              <Line type="monotone" dataKey="Vanilla" stroke={C.vanilla} strokeWidth={2} dot={{r: 4}} />
              <Line type="monotone" dataKey="Dense-FT" stroke={C.dense} strokeWidth={2} dot={{r: 4}} />
              <Line type="monotone" dataKey="KRI-FT" stroke={C.krift} strokeWidth={3} dot={{r: 5}} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function BminChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">Global KV Blocks Needed for Full-Attention Quality</h3>
          <p className="text-gray-500 text-sm mb-4">Minimum global blocks to stay within 0.03 nats/token of full attention (sink + local window always on). At 1024 tokens KRI-FT needs <strong>one</strong> block where vanilla needs eight — an 8× reduction. Reproduced on seeds 42/43/44. The dense control is identical to vanilla.</p>
          <ResponsiveContainer width="100%" height={360}>
            <BarChart data={DATA.bmin} margin={{top: 8, right: 16, left: 24, bottom: 28}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="L" stroke="#94a3b8" height={50} tickMargin={8} label={{value: 'Context length (tokens)', position: 'insideBottom', offset: -4, fill: '#94a3b8'}} />
              <YAxis stroke="#94a3b8" width={64} label={{value: 'Min global blocks', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <Tooltip content={CustomTooltip} />
              <Legend verticalAlign="top" wrapperStyle={{paddingBottom: 10}} />
              <Bar dataKey="Vanilla" fill={C.vanilla} radius={[4,4,0,0]} />
              <Bar dataKey="Dense-FT" fill={C.dense} radius={[4,4,0,0]} />
              <Bar dataKey="KRI-FT" fill={C.krift} radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function CanonicalChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">KL-to-Full-Cache Under Canonical KRI Routers (K=8)</h3>
          <p className="text-gray-500 text-sm mb-4">KRI-FT trained on only one routing rule, yet runs 3–6× lower KL than vanilla under <em>every</em> canonical router — it became generally compatible with the family. Reproduced on seeds 42/43/44 (between-seed variance ~0.0001). Lower is better.</p>
          <ResponsiveContainer width="100%" height={360}>
            <BarChart data={DATA.canonical} margin={{top: 8, right: 16, left: 24, bottom: 8}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="router" stroke="#94a3b8" />
              <YAxis stroke="#94a3b8" width={64} label={{value: 'Mean decode-region KL', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <Tooltip content={CustomTooltip} />
              <Legend verticalAlign="top" wrapperStyle={{paddingBottom: 10}} />
              <Bar dataKey="Vanilla" fill={C.vanilla} radius={[4,4,0,0]} />
              <Bar dataKey="Dense-FT" fill={C.dense} radius={[4,4,0,0]} />
              <Bar dataKey="KRI-FT" fill={C.krift} radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
          <div className="mt-4 text-xs text-gray-400 border-t border-gray-700 pt-3">
            <p className="mb-2 text-gray-500">These routers are training-free state-of-the-art ideas; we only fine-tune the model to tolerate them. Each shape is inspired by published work:</p>
            <ul className="space-y-1">
              <li><strong className="text-gray-300">KRI-Q</strong> — query·block-key criticality, after <a className="text-emerald-400 hover:underline" href="https://arxiv.org/abs/2406.10774">Quest (Tang et al., 2024)</a></li>
              <li><strong className="text-gray-300">KRI-Q-window</strong> — anchor + sink/recent window, after <a className="text-emerald-400 hover:underline" href="https://arxiv.org/abs/2309.17453">StreamingLLM (Xiao et al., 2023)</a></li>
              <li><strong className="text-gray-300">KRI-G</strong> — k-means representative key blocks, after <a className="text-emerald-400 hover:underline" href="https://arxiv.org/abs/2402.04617">InfLLM (Xiao et al., 2024)</a></li>
              <li><strong className="text-gray-300">kv-sum</strong> — per-block K/V magnitude (heavy-hitter proxy), after <a className="text-emerald-400 hover:underline" href="https://arxiv.org/abs/2306.14048">H2O (Zhang et al., 2023)</a></li>
            </ul>
          </div>
        </div>
      );
    }

    function MemFwdChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">The Mechanism: Late-vs-Early Loss Under Routing</h3>
          <p className="text-gray-500 text-sm mb-4">Late-minus-early excess loss (NLL@75–100% − NLL@0–25%) under aggressive recent-only routing at 512 tokens. Vanilla and the dense control degrade by &gt;2 nats at late positions — helplessly missing distant KV. KRI-FT goes <strong>negative</strong>: its late tokens predict better than its early ones, because it learned to forward long-range information into recent hidden states.</p>
          <ResponsiveContainer width="100%" height={360}>
            <BarChart data={DATA.memfwd} margin={{top: 8, right: 16, left: 24, bottom: 8}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="model" stroke="#94a3b8" />
              <YAxis stroke="#94a3b8" width={72} label={{value: 'Late − early excess (nats)', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <Tooltip content={CustomTooltip} />
              <ReferenceLine y={0} stroke="#94a3b8" />
              <Bar dataKey="excess" name="late − early excess" radius={[4,4,0,0]}>
                {DATA.memfwd.map((d, i) => (<Cell key={i} fill={d.color} />))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function NarrowingChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">The Honest Limit: GPT-2 vs a Modern Small Model</h3>
          <p className="text-gray-500 text-sm mb-4">KRI-FT's KL reduction over vanilla under KRI routing. On GPT-2 small it is ~83%; on SmolLM2-360M (RoPE + grouped-query attention) it collapses to ~20% — because vanilla SmolLM2 is <em>already</em> near the routing floor. The size of the win is set by how routing-intolerant the base model is to begin with.</p>
          <ResponsiveContainer width="100%" height={360}>
            <BarChart data={DATA.narrowing} layout="vertical" margin={{top: 8, right: 24, left: 8, bottom: 24}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis type="number" stroke="#94a3b8" domain={[0, 100]} label={{value: 'KL reduction vs vanilla (%)', position: 'insideBottom', offset: -4, fill: '#94a3b8'}} />
              <YAxis type="category" dataKey="base" stroke="#94a3b8" width={160} />
              <Tooltip content={CustomTooltip} />
              <Bar dataKey="KL reduction %" radius={[0,4,4,0]}>
                <Cell fill={C.krift} />
                <Cell fill={C.accent} />
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState(0);
      const tabs = ['Routing Robustness', 'Fewer Blocks', 'Canonical Routers', 'The Mechanism', 'The Honest Limit'];
      return (
        <div className="max-w-6xl mx-auto px-6 py-12">
          <header className="text-center mb-12">
            <a href="index.html" className="text-gray-500 text-sm hover:text-gray-300 mb-4 inline-block">&larr; Back to knlp</a>
            <h1 className="text-4xl font-bold mb-3"><span className="gradient-text">KRI-FT</span></h1>
            <p className="text-gray-400 max-w-2xl mx-auto">
              KV-cache routing keeps only some cache blocks per token to cut decode memory traffic.
              The training-free routers are already state of the art; the question is which ideas can be
              adopted without a full retrain, and where a light fine-tune (PEFT) is the sensible compromise.
              KRI-FT is that compromise: instead of building a better router, it fine-tunes the <em>model</em>
              under the routing mask so it learns to need fewer blocks. The honest finding is that it helps
              models that lack native routing tolerance — and modern small models already mostly have it.
            </p>
          </header>

          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8">
            <StatCard label="Fewer KV blocks" value="8" unit="x" sub="1 vs 8 at L=1024" />
            <StatCard label="Lower PPL" value="6.3" unit="x" sub="recent @ ~23% KV" />
            <StatCard label="Lower KL" value="3-6" unit="x" sub="every KRI router" />
            <StatCard label="Full-attn cost" value="0" unit="%" sub="9.50 vs 9.50" />
            <StatCard label="Seeds" value="3" unit="" sub="42 / 43 / 44" />
          </div>

          <div className="flex flex-wrap gap-2 mb-6 justify-center">
            {tabs.map((t, i) => (
              <button key={i} className={`px-4 py-2 rounded-lg text-sm ${tab === i ? 'tab-active' : 'tab-inactive'}`} onClick={() => setTab(i)}>{t}</button>
            ))}
          </div>

          {tab === 0 && <RoutingChart />}
          {tab === 1 && <BminChart />}
          {tab === 2 && <CanonicalChart />}
          {tab === 3 && <MemFwdChart />}
          {tab === 4 && <NarrowingChart />}

          <div className="grid md:grid-cols-3 gap-4 mt-8">
            <div className="card rounded-xl p-5">
              <h4 className="font-semibold text-emerald-400 mb-2">It is the training, not the data</h4>
              <p className="text-gray-400 text-sm">A matched dense-trained control (same data, KL, and steps, dense attention) stays tied with vanilla under routing. The operative variable is the routing-aware curriculum, confirmed across datasets and seeds.</p>
            </div>
            <div className="card rounded-xl p-5">
              <h4 className="font-semibold text-amber-400 mb-2">Memory forwarding is the mechanism</h4>
              <p className="text-gray-400 text-sm">KRI-FT's late-position loss goes below its early-position loss under routing — direct evidence it pushes long-range information into recent hidden states. An oracle block selector agrees: KRI-FT is at the floor with zero global blocks where vanilla cannot reach it with sixteen.</p>
            </div>
            <div className="card rounded-xl p-5">
              <h4 className="font-semibold text-red-400 mb-2">A conditional tool, honestly</h4>
              <p className="text-gray-400 text-sm">At iso-retention the KRI score is not better than sink+recent; the win is in the model. On modern GQA models the effect shrinks to a few percent because they start near the floor. Use KRI-FT where a base model degrades under routing, skip it where it does not.</p>
            </div>
          </div>

          <div className="card rounded-xl p-6 mt-8 text-center">
            <h3 className="text-lg font-semibold mb-2">Reproduce it</h3>
            <p className="text-gray-400 text-sm max-w-3xl mx-auto mb-4">
              Single-GPU, plain matmul+softmax attention (no FlashAttention dependency), exports a standard
              HuggingFace checkpoint. The code, the full results, and every caveat are in the repository.
            </p>
            <a href="https://github.com/mcgrof/knlp/tree/main/gpt2-kri-ft" className="text-emerald-400 hover:text-emerald-300 text-sm">Read the KRI-FT code and results &rarr;</a>
          </div>

          <footer className="text-center text-gray-600 text-sm border-t border-gray-800 pt-8 mt-12">
            <p className="mb-2">
              <a href="index.html" className="hover:text-gray-400">Home</a>
              <span className="mx-2">&middot;</span>
              <a href="https://github.com/mcgrof/knlp" className="hover:text-gray-400">GitHub</a>
              <span className="mx-2">&middot;</span>
              <a href="kri_ft.md" className="hover:text-gray-400">KRI-FT Docs</a>
            </p>
            <p>GPT-2 small (124M) and SmolLM2-360M, KV-routed perplexity and KL-to-full-cache on TinyStories / WikiText-103 / FineWeb-Edu</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
