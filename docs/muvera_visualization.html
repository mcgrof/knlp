<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>muvera-small: Is NVMe Read Amplification Inevitable for Tiny Retrieval Records?</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@16.14.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@16.14.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@1.8.5/umd/Recharts.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .gradient-text { background: linear-gradient(135deg, #f59e0b, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card { background: linear-gradient(145deg, #1e293b, #1a2332); border: 1px solid #334155; transition: all 0.3s ease; }
    .card:hover { border-color: #22d3ee; box-shadow: 0 4px 20px -5px rgba(34, 211, 238, 0.2); }
    .tab-active { background: #22d3ee; color: #0f172a; font-weight: 600; }
    .tab-inactive { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .tab-inactive:hover { border-color: #22d3ee; color: #22d3ee; }
    .stat-card { background: linear-gradient(145deg, #1e293b, #1a2332); border: 1px solid #334155; }
    code { color: #22d3ee; }
  </style>
</head>
<body class="min-h-screen text-gray-100">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const {
      LineChart, Line, BarChart, Bar, ScatterChart, Scatter, XAxis, YAxis,
      ZAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, Cell, LabelList
    } = Recharts;

    const C = { cyan: '#22d3ee', amber: '#f59e0b', red: '#ef4444', blue: '#3b82f6', emerald: '#10b981', gray: '#64748b' };

    // Embedded from benchmarks/muvera/sample (BeIR/scifact, AMD W7900, ROCm 6.4)
    const DATA = {
      systems: [
        {bytes: 32,    mmap_p50: 150,  h2d: 27.4, proj: 30.3},
        {bytes: 64,    mmap_p50: 140,  h2d: 27.6, proj: 29.2},
        {bytes: 128,   mmap_p50: 190,  h2d: 28.8, proj: 31.4},
        {bytes: 256,   mmap_p50: 630,  h2d: 29.1, proj: 31.9},
        {bytes: 512,   mmap_p50: 840,  h2d: 21.2, proj: 32.0},
        {bytes: 1024,  mmap_p50: 1000, h2d: 21.3, proj: 35.0},
        {bytes: 2048,  mmap_p50: 1220, h2d: 29.6, proj: 35.7},
        {bytes: 4096,  mmap_p50: 1400, h2d: 26.2, proj: 45.4},
        {bytes: 8192,  mmap_p50: 1640, h2d: 42.9, proj: 70.7},
        {bytes: 16384, mmap_p50: 1970, h2d: 59.2, proj: 122.0}
      ],
      // theoretical 4 KiB-page read amplification for a logical record (bytes fetched / record)
      amp: [
        {bytes: '32 B',   amp: 128}, {bytes: '64 B',  amp: 64}, {bytes: '128 B', amp: 32},
        {bytes: '256 B',  amp: 16},  {bytes: '512 B', amp: 8},  {bytes: '1 KiB', amp: 4},
        {bytes: '2 KiB',  amp: 2},   {bytes: '4 KiB', amp: 1}
      ],
      retrieval: [
        {name: 'pooled-int8',  bytes: 384,    recall: 0.857, fill: C.emerald},
        {name: 'pooled-fp16',  bytes: 768,    recall: 0.857, fill: C.emerald},
        {name: 'pooled-fp32',  bytes: 1536,   recall: 0.857, fill: C.emerald},
        {name: 'FDE int8 d512',bytes: 512,    recall: 0.393, fill: C.amber},
        {name: 'FDE d1024',    bytes: 2048,   recall: 0.370, fill: C.amber},
        {name: 'ColBERTv2 oracle', bytes: 120654, recall: 0.807, fill: C.blue}
      ]
    };

    function StatCard({label, value, unit, sub}) {
      return (
        <div className="stat-card rounded-lg p-4 text-center">
          <div className="text-gray-500 text-xs uppercase tracking-wide mb-1">{label}</div>
          <div className="text-2xl font-bold text-white">{value}<span className="text-sm text-gray-400 ml-1">{unit}</span></div>
          {sub && <div className="text-xs text-gray-500 mt-1">{sub}</div>}
        </div>
      );
    }

    function CustomTooltip({active, payload, label}) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div className="bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm">
          {label !== undefined && <div className="text-gray-400 mb-1">{label}</div>}
          {payload.map((p, i) => (
            <div key={i} style={{color: p.color || p.fill}}>{p.name}: <strong>{typeof p.value === 'number' ? p.value.toLocaleString() : p.value}</strong></div>
          ))}
        </div>
      );
    }

    function SystemsChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">Cache/Memory-Resident Byte Floor</h3>
          <p className="text-gray-500 text-sm mb-4">Warm mmap random-read p50 latency (and CPU→GPU H2D transfer) vs logical record size, in a memory-/cache-resident store. Smaller records are genuinely faster to touch, with the knee around <strong>256–512 B</strong>. This is the real win that sub-4096-byte retrieval records promise — <em>as long as the data stays resident.</em></p>
          <ResponsiveContainer width="100%" height={360}>
            <LineChart data={DATA.systems} margin={{top: 8, right: 16, left: 28, bottom: 28}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="bytes" stroke="#94a3b8" scale="log" domain={[32, 16384]} type="number" height={50} tickMargin={8} label={{value: 'Record bytes (log)', position: 'insideBottom', offset: -4, fill: '#94a3b8'}} />
              <YAxis yAxisId="l" stroke="#94a3b8" width={70} label={{value: 'mmap rand p50 (ns)', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <YAxis yAxisId="r" orientation="right" stroke="#94a3b8" label={{value: 'H2D x64 p50 (μs)', angle: 90, position: 'insideRight', fill: '#94a3b8'}} />
              <Tooltip content={CustomTooltip} />
              <Legend verticalAlign="top" wrapperStyle={{paddingBottom: 10}} />
              <ReferenceLine yAxisId="l" x={4096} stroke={C.red} strokeDasharray="5 5" label={{value: '4 KiB page', fill: C.red, position: 'top'}} />
              <Line yAxisId="l" type="monotone" dataKey="mmap_p50" name="mmap rand p50 (ns)" stroke={C.cyan} strokeWidth={3} dot={{r: 4}} />
              <Line yAxisId="r" type="monotone" dataKey="h2d" name="H2D x64 p50 (μs)" stroke={C.amber} strokeWidth={2} dot={{r: 3}} />
            </LineChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function AmpChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">NVMe Read Amplification — The Inevitability</h3>
          <p className="text-gray-500 text-sm mb-4">A storage device reads at <strong>page/block granularity</strong> (4 KiB here). A cold or O_DIRECT random read of a sub-page logical record still fetches a whole page, so the bytes actually read divided by the logical record is the read amplification below. A 32-byte record costs a 4 KiB read — <strong>128×</strong>. The benchmark measured ~4–32× effective amplification on cold/O_DIRECT random reads; the point is the same: <em>the sub-page latency advantage disappears the moment the access path falls through to raw NVMe.</em></p>
          <ResponsiveContainer width="100%" height={360}>
            <BarChart data={DATA.amp} margin={{top: 8, right: 16, left: 24, bottom: 28}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis dataKey="bytes" stroke="#94a3b8" height={50} tickMargin={8} label={{value: 'Logical record size', position: 'insideBottom', offset: -4, fill: '#94a3b8'}} />
              <YAxis stroke="#94a3b8" width={64} scale="log" domain={[1, 128]} allowDataOverflow label={{value: 'Read amplification (×, log)', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <Tooltip content={CustomTooltip} />
              <ReferenceLine y={1} stroke={C.emerald} strokeDasharray="5 5" label={{value: '1× (no amplification)', fill: C.emerald, position: 'right'}} />
              <Bar dataKey="amp" name="read amplification (x)" radius={[4,4,0,0]}>
                {DATA.amp.map((d, i) => (<Cell key={i} fill={d.amp >= 16 ? C.red : d.amp > 1 ? C.amber : C.emerald} />))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function RetrievalChart() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-1">Retrieval Quality vs Bytes per Vector</h3>
          <p className="text-gray-500 text-sm mb-4">BeIR/scifact recall@10 vs stored bytes per record. <strong>Pooled int8 (384 B)</strong> nearly matches the full ColBERTv2 multi-vector oracle (120 KB) at ~1/300th the bytes. MUVERA-style FDE compression of multi-vector queries only earns its complexity at multi-KiB budgets; below that, a pooled single-vector int8 baseline is hard to beat. int8 is effectively free.</p>
          <ResponsiveContainer width="100%" height={360}>
            <ScatterChart margin={{top: 8, right: 16, left: 28, bottom: 28}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
              <XAxis type="number" dataKey="bytes" name="bytes/vec" stroke="#94a3b8" scale="log" domain={[256, 200000]} height={50} tickMargin={8} label={{value: 'Bytes per vector (log)', position: 'insideBottom', offset: -4, fill: '#94a3b8'}} />
              <YAxis type="number" dataKey="recall" name="recall@10" stroke="#94a3b8" width={64} domain={[0.3, 0.95]} label={{value: 'recall@10', angle: -90, position: 'insideLeft', offset: 0, style: {textAnchor: 'middle'}, fill: '#94a3b8'}} />
              <ZAxis range={[120, 120]} />
              <Tooltip content={CustomTooltip} cursor={{strokeDasharray: '3 3'}} />
              <Scatter data={DATA.retrieval} name="variant">
                {DATA.retrieval.map((d, i) => (<Cell key={i} fill={d.fill} />))}
                <LabelList dataKey="name" position="top" style={{fill: '#94a3b8', fontSize: 11}} />
              </Scatter>
            </ScatterChart>
          </ResponsiveContainer>
        </div>
      );
    }

    function ReproducePanel() {
      return (
        <div className="card rounded-xl p-6 mb-6">
          <h3 className="text-lg font-semibold mb-3">Reproduce it</h3>
          <p className="text-gray-400 text-sm mb-4">The benchmark is a Kconfig-style defconfig + make flow. Three commands:</p>
          <pre className="bg-gray-900 border border-gray-700 rounded-lg p-4 text-sm overflow-x-auto mb-4"><code>make defconfig-muvera-small   # writes .config
make muvera-small             # setup + systems + retrieval + plots
make muvera-small-report      # writes report.md</code></pre>
          <p className="text-gray-400 text-sm mb-2">Results land under <code>CONFIG_MUVERA_OUTPUT_BASE</code> (any writable dir) as CSVs, plots, and a <code>report.md</code>. The optional cold-NVMe test — the part that demonstrates the read amplification above — is off by default:</p>
          <pre className="bg-gray-900 border border-gray-700 rounded-lg p-4 text-sm overflow-x-auto mb-4"><code>echo 'CONFIG_MUVERA_ENABLE_NVME_COLD_BENCH=y' >> .config
echo 'CONFIG_MUVERA_NVME_BENCH_PATH=/mnt/nvme/muvera_bench' >> .config
make muvera-small-nvme-cold</code></pre>
          <div className="grid md:grid-cols-2 gap-4 mt-4">
            <div className="bg-gray-900 border border-gray-700 rounded-lg p-4">
              <h4 className="font-semibold text-cyan-400 mb-2">Do I need a GPU?</h4>
              <p className="text-gray-400 text-sm">Yes, a <strong>single GPU</strong> for the full run: building the ColBERTv2 and BGE embeddings, the CPU→GPU H2D transfer measurement, and the GPU projection cost all use <code>CONFIG_MUVERA_DEVICE</code> (default <code>cuda:0</code>). Validated on one AMD Radeon Pro W7900 (ROCm 6.4); any single CUDA or ROCm GPU on a Linux box works.</p>
            </div>
            <div className="bg-gray-900 border border-gray-700 rounded-lg p-4">
              <h4 className="font-semibold text-amber-400 mb-2">What runs without a GPU?</h4>
              <p className="text-gray-400 text-sm">The systems byte-floor reads (warm mmap random reads) and the optional cold-NVMe / O_DIRECT amplification test are <strong>storage- and CPU-bound</strong> — no GPU involved. Those are the measurements behind the read-amplification story; the GPU is only needed to also produce the retrieval-quality frontier.</p>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState(0);
      const tabs = ['Cache Byte Floor', 'NVMe Read Amplification', 'Retrieval Frontier', 'Reproduce'];
      return (
        <div className="max-w-6xl mx-auto px-6 py-12">
          <header className="text-center mb-12">
            <a href="index.html" className="text-gray-500 text-sm hover:text-gray-300 mb-4 inline-block">&larr; Back to knlp</a>
            <h1 className="text-4xl font-bold mb-3"><span className="gradient-text">muvera-small</span></h1>
            <p className="text-gray-400 max-w-2xl mx-auto">
              Sub-4096-byte retrieval vectors are real and fast — in a memory- or cache-resident store.
              The question this reproducible benchmark answers: does that advantage survive when the access path
              falls through to raw NVMe? It does not. A storage device reads at page granularity, so a tiny
              logical record still pays a full-page read — read amplification that looks close to inevitable
              unless the storage stack packs, batches, caches, or filters near storage.
            </p>
          </header>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
            <StatCard label="Latency knee" value="256-512" unit="B" sub="mmap random reads" />
            <StatCard label="Sub-page read amp" value="up to 128" unit="x" sub="32 B on a 4 KiB page" />
            <StatCard label="pooled-int8" value="384" unit="B" sub="recall@10 0.857" />
            <StatCard label="ColBERTv2 oracle" value="120" unit="KB" sub="recall@10 0.807" />
          </div>

          <div className="flex flex-wrap gap-2 mb-6 justify-center">
            {tabs.map((t, i) => (
              <button key={i} className={`px-4 py-2 rounded-lg text-sm ${tab === i ? 'tab-active' : 'tab-inactive'}`} onClick={() => setTab(i)}>{t}</button>
            ))}
          </div>

          {tab === 0 && <SystemsChart />}
          {tab === 1 && <AmpChart />}
          {tab === 2 && <RetrievalChart />}
          {tab === 3 && <ReproducePanel />}

          <div className="grid md:grid-cols-3 gap-4 mt-8">
            <div className="card rounded-xl p-5">
              <h4 className="font-semibold text-cyan-400 mb-2">Resident: tiny records win</h4>
              <p className="text-gray-400 text-sm">In a cache-/memory-resident store, smaller records are genuinely faster to touch, with most of the gain captured by ~256–512 B. int8 quantization is effectively free here.</p>
            </div>
            <div className="card rounded-xl p-5">
              <h4 className="font-semibold text-red-400 mb-2">Cold NVMe: the floor bites</h4>
              <p className="text-gray-400 text-sm">Raw random NVMe reads fetch a whole page regardless of logical record size, so sub-page records suffer 4–32× (up to a theoretical 128×) read amplification. The sub-page advantage evaporates.</p>
            </div>
            <div className="card rounded-xl p-5">
              <h4 className="font-semibold text-amber-400 mb-2">So: design the access path</h4>
              <p className="text-gray-400 text-sm">To exploit sub-page retrieval records you need packed layouts, batching, caching, or near-storage filtering. MUVERA/FDE only earns its complexity above multi-KiB budgets; a pooled int8 baseline is hard to beat below that.</p>
            </div>
          </div>

          <div className="card rounded-xl p-6 mt-8 text-center">
            <h3 className="text-lg font-semibold mb-2">Run it yourself</h3>
            <p className="text-gray-400 text-sm max-w-3xl mx-auto mb-4">
              <code>make defconfig-muvera-small &amp;&amp; make muvera-small</code> on any Linux box with a single GPU.
              The code, configs, and a sample report are in the repository.
            </p>
            <a href="https://github.com/mcgrof/knlp/tree/main/benchmarks/muvera" className="text-cyan-400 hover:text-cyan-300 text-sm">Read the muvera-small benchmark &rarr;</a>
          </div>

          <footer className="text-center text-gray-600 text-sm border-t border-gray-800 pt-8 mt-12">
            <p className="mb-2">
              <a href="index.html" className="hover:text-gray-400">Home</a>
              <span className="mx-2">&middot;</span>
              <a href="https://github.com/mcgrof/knlp" className="hover:text-gray-400">GitHub</a>
            </p>
            <p>BeIR/scifact, single GPU (AMD W7900, ROCm 6.4); systems byte-floor + retrieval frontier, sample run</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
