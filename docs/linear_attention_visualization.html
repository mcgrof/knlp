<!DOCTYPE html>

  <title>Linear Attention &amp; Bounded Memory — DeltaNet, Gated DeltaNet, Trellis</title>
  <meta name="description" content="knlp's from-scratch reimplementation of the linear-attention / bounded-memory family — DeltaNet, Gated DeltaNet, and Trellis (arXiv:2512.23852). A matched-harness study of whether Trellis's nonlinear memory writer beats its linear cousins, and a fused Triton kernel that closes the throughput gap. Preliminary work, still being brought into line with the paper's original intent.">
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@16.14.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@16.14.0/umd/react-dom.production.min.js"></script>

</head>
<body class="min-h-screen text-gray-100">
  <!-- Shared Navigation -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap justify-center gap-2">
      <a href="index.html" class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-sm font-medium text-gray-300 transition-colors">&larr; Home</a>

      <a href="kvsplice_visualization.html" class="px-3 py-1.5 bg-gray-800 hover:bg-orange-600 rounded text-sm font-medium text-gray-300 hover:text-white transition-colors">KVSplice</a>
      <a href="ra_visualization.html" class="px-3 py-1.5 bg-gray-800 hover:bg-cyan-600 rounded text-sm font-medium text-gray-300 hover:text-white transition-colors">RA</a>
      <a href="fisher_adam_visualization.html" class="px-3 py-1.5 bg-gray-800 hover:bg-blue-600 rounded text-sm font-medium text-gray-300 hover:text-white transition-colors">FIM-Adam</a>
    </div>
  </nav>

  <div id="root"></div>

  <script type="text/babel">
    const {
      LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
      ResponsiveContainer, ReferenceLine, Cell, ComposedChart, Label
    } = Recharts;

    const C = {
      indigo:'#6366f1', violet:'#8b5cf6', blue:'#3b82f6', green:'#10b981',
      amber:'#f59e0b', red:'#ef4444', cyan:'#06b6d4', gray:'#64748b', slate:'#334155', rose:'#f43f5e'
    };

    // ───────────────────────── DATA (verified: archives + arXiv:2512.23852) ─────────────────────────

    // Matched A100 run: C4 d256/L4, seq2048, 20 tok/param (~352M tok),
    // fp32-master + bf16-autocast, AdamW, fla REFERENCE baselines, Trellis fused-Triton kernel, one pod.
    const FAIR = [
      {model:'Gated DeltaNet', short:'GatedDelta', ppl:78.49,  params:4.48, klass:'win',  note:'fla reference'},
      {model:'DeltaNet',       short:'DeltaNet',   ppl:89.77,  params:4.21, klass:'win',  note:'fla reference'},
      {model:'Trellis',        short:'Trellis',    ppl:152.54, params:4.74, klass:'mid',  note:'this work'},
      {model:'dense Transformer', short:'dense', ppl:224.89, params:4.72, klass:'lose', note:'KV grows with T'},
    ];

    // PG19 long-context: scratch Trellis vs matched dense (full-strength sequential, multi-seed).
    // Trellis beats dense and the margin holds/widens with context. (Family ordering here is
    // superseded by the fair A100 run; this panel shows the Trellis-vs-DENSE direction only.)
    const PG19 = [
      {len:'512',  trellis:1542, dense:1581, delta:-2.5},
      {len:'1024', trellis:1517, dense:1635, delta:-7.3},
      {len:'2048', trellis:585,  dense:621,  delta:-5.9},
      {len:'4096', trellis:546,  dense:622,  delta:-12.1},
    ];

    // Mixer-level throughput (A100, fwd+bwd, [B8,T2048,d256,H4]), tok/s in thousands.
    const THRU = [
      {mixer:'fla GatedDelta',    tps:3891, kind:'linear'},
      {mixer:'fla DeltaNet',      tps:3315, kind:'linear'},
      {mixer:'dense MHA',         tps:2941, kind:'dense'},
      {mixer:'Trellis (Triton)',  tps:770,  kind:'trellis'},
      {mixer:'Trellis (Python)',  tps:121,  kind:'slow'},
      {mixer:'our DeltaNet (bmm)',tps:85,   kind:'slow'},
    ];

    // Paper Table 1 — 790M params / 30B tokens (C4). PPL lower=better.
    const PAPER_790 = [
      {model:'Trellis',        ppl:20.28, best:true},
      {model:'Gated DeltaNet', ppl:21.40, best:false},
      {model:'Transformer++',  ppl:25.89, best:false},
      {model:'TTT',            ppl:27.05, best:false},
      {model:'Mamba2',         ppl:28.91, best:false},
    ];
    // Paper Table 2 — 125M ablation (The Pile). NO Gated-DeltaNet row at 125M.
    const PAPER_125 = [
      {row:'Trellis (full)',         ppl:10.87, kind:'full'},
      {row:'b=1 (no chunking)',      ppl:10.75, kind:'full'},
      {row:'w/o forget gate',        ppl:11.28, kind:'abl'},
      {row:'TTT',                    ppl:11.44, kind:'base'},
      {row:'DeltaNet',               ppl:11.58, kind:'base'},
      {row:'linear φ (f=LN-SiLU)',   ppl:11.65, kind:'abl'},
    ];

    // ───────────────────────── reusable components (knlp family idiom) ─────────────────────────
    function StatCard({label, value, unit, sub, color}) {
      return (
        <div className="stat-card rounded-lg p-4">
          <div className="text-gray-500 text-xs uppercase tracking-wide mb-1">{label}</div>
          <div className="text-2xl font-bold" style={{color: color||'#fff'}}>{value}<span className="text-sm text-gray-400 ml-1">{unit}</span></div>
          {sub && <div className="text-xs text-gray-500 mt-1">{sub}</div>}
        </div>
      );
    }
    function Tip({active, payload, label}) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div className="bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm">
          {label !== undefined && <div className="text-gray-400 mb-1">{label}</div>}
          {payload.map((p, i) => (
            <div key={i} style={{color: p.color || p.fill}}>
              {p.name}: <strong>{typeof p.value === 'number' ? p.value.toLocaleString() : p.value}</strong>
            </div>
          ))}
        </div>
      );
    }
    function Section({id, kicker, title, children}) {
      return (
        <section id={id} className="anchor card rounded-xl p-6 md:p-8 mb-8">
          {kicker && <div className="text-xs uppercase tracking-widest mb-2" style={{color:C.violet}}>{kicker}</div>}
          <h2 className="text-2xl font-bold mb-4">{title}</h2>
          <div className="prose text-gray-400 text-[15px] leading-relaxed max-w-none">{children}</div>
        </section>
      );
    }
    function ChartFrame({title, sub, height, children}) {
      return (
        <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4 my-5">
          {title && <h4 className="text-sm font-semibold text-gray-200 mb-0.5">{title}</h4>}
          {sub && <p className="text-gray-500 text-xs mb-3">{sub}</p>}
          <ResponsiveContainer width="100%" height={height||320}>{children}</ResponsiveContainer>
        </div>
      );
    }
    const Pill = ({k, children}) => {
      const m = {win:'pill-win', mid:'pill-mid', lose:'pill-lose'};
      return <span className={`pill ${m[k]}`}>{children}</span>;
    };
    const KLASS = {win:C.green, mid:C.violet, lose:C.red};

    // ───────────────────────── the page ─────────────────────────
    function App() {
      return (
        <div className="max-w-5xl mx-auto px-5 py-12">
          {/* Header */}
          <header className="text-center mb-10">
            <a href="index.html" className="text-gray-500 text-sm hover:text-gray-300 mb-4 inline-block">&larr; Back to knlp</a>
            <h1 className="text-4xl md:text-5xl font-bold mb-4 leading-tight">
              <span className="gradient-text">Linear Attention</span> &amp; Bounded Memory
            </h1>
            <p className="text-gray-400 max-w-3xl mx-auto text-lg">
              A dense Transformer&rsquo;s KV cache grows with context; this family replaces it with a
              <strong className="text-gray-200"> fixed-size recurrent state</strong>. We reimplemented three of them
              from scratch in one matched harness &mdash; <strong className="text-gray-200">DeltaNet</strong>,
              <strong className="text-gray-200"> Gated DeltaNet</strong>, and
              <strong className="text-gray-200"> Trellis</strong> &mdash; to ask whether Trellis&rsquo;s
              <em> nonlinear</em> memory writer beats its <em>linear</em> cousins at matched size. The work is
              preliminary and still in progress, aimed at matching the paper&rsquo;s original intent.
            </p>
          </header>

          {/* Key stats */}
          <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
            <StatCard label="Models" value="3 + dense" sub="one matched harness" />
            <StatCard label="Trained scale" value="4.7" unit="M" sub="paper floor is 125M" />
            <StatCard label="Decode state" value="O(1)" sub="constant in context" color={C.green}/>
            <StatCard label="Fused kernel" value="6.4" unit="×" sub="Trellis mixer fwd+bwd" color={C.violet}/>
            <StatCard label="Trellis PPL" value="152.5" sub="vs GatedDelta 78.5" color={C.amber}/>
            <StatCard label="Status" value="preliminary" sub="matching paper intent" color={C.amber}/>
          </div>

          {/* TLDR */}
          <div className="card rounded-xl p-6 mb-8 border-l-4" style={{borderLeftColor:C.violet}}>
            <h3 className="font-semibold text-violet-400 mb-2">The result in one breath</h3>
            <p className="text-gray-300 text-[15px] leading-relaxed">
              At the scale we can afford to train (&asymp;4.7M non-embedding parameters), our Trellis
              <strong className="text-white"> currently loses</strong> to both DeltaNet and Gated DeltaNet. That is a
              normal <em> below-crossover</em> result &mdash; worse than its linear cousins at toy scale, which is where
              the Trellis paper says it should be, because the paper only claims a win at
              <strong className="text-white"> 125M parameters and up</strong>, which we have not reached. We are still
              working on this. What follows is where the line stands today: the architecture, our reconstruction and
              where it departs from the paper, the kernel work that made the comparison tractable, the numbers so far,
              and the forward ablations that remain to match the paper&rsquo;s original intent.
            </p>
          </div>

          {/* 1. lineage */}
          <Section id="lineage" kicker="Where it comes from" title="The delta-rule lineage">
            <p>
              The family descends from the <a href="https://isl.stanford.edu/~widrow/papers/c1960adaptiveswitching.pdf" className="text-violet-300 hover:underline"><strong>delta rule</strong> (Widrow &amp; Hoff, 1960)</a>,
              an online least-squares update that nudges a weight matrix to shrink a per-step prediction error.
              <a href="https://arxiv.org/pdf/2102.11174" className="text-violet-300 hover:underline">Schlag et al. (2021)</a> recast
              linear attention as a <strong>fast-weight</strong> memory written by exactly that update; the delta-rule model
              &mdash; later parallelized and scaled as <a href="https://arxiv.org/abs/2406.06484" className="text-violet-300 hover:underline"><strong>DeltaNet</strong></a> &mdash;
              is the linear baseline here. Adding a learned forget gate gives
              <a href="https://arxiv.org/abs/2412.06464" className="text-violet-300 hover:underline"><strong> Gated DeltaNet</strong></a>
              (<a href="https://podcast.do-not-panic.com/episodes/gated-delta-networks-for-long-context-retrieval/" className="text-violet-300 hover:underline">podcast</a>).
              A separate thread, test-time training (TTT, Titans, Atlas), reaches the same place from the optimization side.
              <a href="https://podcast.do-not-panic.com/episodes/trellis-and-bounded-memory-transformer-kv-compression/" className="text-violet-300 hover:underline"><strong> Trellis</strong></a>
              (<a href="https://arxiv.org/abs/2512.23852" className="text-violet-300 hover:underline">arXiv:2512.23852</a>) sits at the junction:
              a gated delta-rule memory whose inner write is a <em>nonlinear</em> gradient step. That single
              nonlinearity is the whole bet &mdash; it is what the paper credits for the long-context win, and
              what costs Trellis the cheap exact training kernel its linear cousins get for free.
            </p>
            <div className="flex flex-wrap items-center justify-center gap-2 text-sm my-4">
              {['delta rule (1960)','fast-weight linear attn (2021)','DeltaNet','Gated DeltaNet','test-time memory','Trellis'].map((n,i,a)=>(
                <React.Fragment key={i}>
                  <span className="px-3 py-1.5 rounded-lg bg-[#0b1220] border border-gray-800 text-gray-300">{n}</span>
                  {i<a.length-1 && <span className="text-violet-500">&rarr;</span>}
                </React.Fragment>
              ))}
            </div>
          </Section>

          {/* 2. what each is */}
          <Section id="models" kicker="The three writers" title="What each model actually computes">
            <p>
              All three keep a per-head recurrent state and read it <strong>write-before-read</strong> &mdash; the
              state is updated with the current token, then queried. The only difference that matters is whether
              the inner write is linear in the state.
            </p>
            <div className="grid md:grid-cols-3 gap-4 mt-2">
              <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4">
                <div className="flex items-center justify-between mb-2"><h4 className="font-semibold text-green-300"><a href="https://arxiv.org/abs/2406.06484" className="hover:underline">DeltaNet</a></h4><Pill k="win">linear</Pill></div>
                <p className="text-sm text-gray-400">Fast-weight matrix <span className="kbd">S</span>, delta-rule write
                <span className="kbd">S &larr; S + β(v − Sk)kᵀ</span>, read <span className="kbd">o = Sq</span>. Inner step
                is linear in <span className="kbd">S</span>, so it gets an <strong>exact chunk-parallel kernel</strong>.</p>
              </div>
              <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4">
                <div className="flex items-center justify-between mb-2"><h4 className="font-semibold text-green-300"><a href="https://podcast.do-not-panic.com/episodes/gated-delta-networks-for-long-context-retrieval/" className="hover:underline">Gated DeltaNet</a></h4><Pill k="win">linear</Pill></div>
                <p className="text-sm text-gray-400">DeltaNet plus a learned scalar decay
                <span className="kbd">S &larr; αS + β(v − αSk)kᵀ</span>. The gate lets memory forget, which matters at
                length. Still linear, still exact-chunkable &mdash; and the standout at the scale we can train.</p>
              </div>
              <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4">
                <div className="flex items-center justify-between mb-2"><h4 className="font-semibold text-violet-300"><a href="https://podcast.do-not-panic.com/episodes/trellis-and-bounded-memory-transformer-kv-compression/" className="hover:underline">Trellis</a></h4><Pill k="mid">nonlinear</Pill></div>
                <p className="text-sm text-gray-400">An <span className="kbd">m</span>-slot memory <span className="kbd">M</span>,
                one online-gradient step on <span className="kbd">½‖φ(Mw) − α‖²</span> per token:
                <span className="kbd">M &larr; βM − γ&middot;u wᵀ</span>, <span className="kbd">u = Jφ(z)ᵀ(φ(z)−α)</span>. The
                nonlinear <span className="kbd">φ</span> is the difference from DeltaNet, and the source of everything
                below. Two-pass (key then value).</p>
              </div>
            </div>
          </Section>

          {/* 3. the fair A100 result */}
          <Section id="fair" kicker="The decisive comparison" title="One clean run, one pod, fair baselines">
            <p>
              The comparison that settles it is a single A100 run under one protocol: C4, <span className="kbd">d256/L4</span>,
              sequence length 2048, 20 tokens per parameter (&asymp;352M tokens), fp32 master weights with bf16 autocast,
              the fla <strong>reference</strong> DeltaNet / Gated DeltaNet layers (short conv + qk-norm + output gate &mdash;
              not strawmen), and the Trellis fused kernel, all in the same pod.
            </p>
            <ChartFrame title="Validation perplexity — matched A100 run (lower is better)"
              sub="fla reference baselines, Trellis fused-Triton kernel, identical protocol. Green = linear cousins, violet = Trellis, red = dense.">
              <BarChart data={FAIR} margin={{top:8, right:16, left:0, bottom:60}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.slate}/>
                <XAxis dataKey="short" stroke="#94a3b8" angle={-25} textAnchor="end" height={80} interval={0} tick={{fontSize:11}}/>
                <YAxis stroke="#94a3b8" domain={[0,240]} label={{value:'val PPL', angle:-90, position:'insideLeft', fill:'#94a3b8'}}/>
                <Tooltip content={<Tip/>}/>
                <Bar dataKey="ppl" name="val PPL" radius={[3,3,0,0]}>
                  {FAIR.map((d,i)=><Cell key={i} fill={KLASS[d.klass]}/>)}
                </Bar>
              </BarChart>
            </ChartFrame>
            <p>
              Trellis at 152.54 sits clearly between the dense baseline and the linear family &mdash; a normal
              <em> below-crossover</em> result, not near-dense. But it still loses to plain DeltaNet and to Gated
              DeltaNet, at a small <strong> parameter disadvantage to the baselines</strong> (it carries ~5&ndash;12%
              more non-embedding parameters and still loses, which makes the loss conservative). In nats at matched
              tokens, Trellis is <strong>+0.53 nat</strong> behind DeltaNet and <strong>+0.66</strong> behind Gated
              DeltaNet.
            </p>
            <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4 text-sm text-gray-400">
              <strong className="text-gray-200">Why this is the run that counts.</strong> It is the one comparison
              that is simultaneously matched in size, on a fair GPU, against the fla reference baselines (conv +
              qk-norm + output gate, not strawmen), and at a real token budget &mdash; so the ordering it gives is the
              one to trust over any smaller or less controlled run.
            </div>
          </Section>

          {/* 4. PG19 long context */}
          <Section id="pg19" kicker="The structural win" title="Bounded memory beats dense at length">
            <p>
              On PG19, a real long-range corpus, scratch Trellis beats a matched <strong>dense</strong> Transformer and
              the margin holds as context grows &mdash; the bounded-memory-at-length effect the architecture exists for,
              while Trellis&rsquo;s state stays constant in sequence length and dense&rsquo;s KV cache does not. This is the
              part of the story that is solid regardless of the cousin comparison.
            </p>
            <ChartFrame title="PG19 — Trellis vs matched dense, by context length"
              sub="Multi-seed scratch training. Bars: val PPL (lower better). The Trellis-beats-dense direction is robust; the family ordering is settled by the fair A100 run above, not here.">
              <ComposedChart data={PG19} margin={{top:8, right:16, left:0, bottom:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.slate}/>
                <XAxis dataKey="len" stroke="#94a3b8" label={{value:'context length', position:'insideBottom', offset:-4, fill:'#94a3b8'}}/>
                <YAxis stroke="#94a3b8" label={{value:'val PPL', angle:-90, position:'insideLeft', fill:'#94a3b8'}}/>
                <Tooltip content={<Tip/>}/>
                <Legend verticalAlign="top" wrapperStyle={{paddingBottom:6, fontSize:12}}/>
                <Bar dataKey="dense" name="dense" fill={C.red} radius={[3,3,0,0]}/>
                <Bar dataKey="trellis" name="Trellis" fill={C.violet} radius={[3,3,0,0]}/>
              </ComposedChart>
            </ChartFrame>
          </Section>

          {/* 6. kernels */}
          <Section id="kernels" kicker="Engineering" title="Why Trellis is the slow one — and the fused kernel">
            <p>
              DeltaNet and Gated DeltaNet get an <strong>exact chunk-parallel kernel</strong> as a gift of linearity:
              each step is a fixed affine map, affine maps compose, so a whole chunk collapses into matmuls. Trellis
              cannot have this. Its nonlinear <span className="kbd">φ</span> makes the within-chunk dependency
              non-affine; the obvious causal fixed-point reaches the exact answer only after
              <span className="kbd">C&minus;1</span> passes, the same cost as the sequential loop. We did not prove a
              lower bound &mdash; a cleverer solver might exist &mdash; but there is no fixed-size, WY-style associative
              form, so the cheap exact kernel is forfeited. The paper trains with the same <em>stale</em>-gradient chunk
              approximation we use; the authors most likely ate that tax with a mature kernel rather than holding a
              secret exact form.
            </p>
            <p>
              Most of Trellis&rsquo;s apparent slowness, though, was a Python launch-bound loop, not the algorithm. A
              fused Triton kernel collapses the per-chunk launches into one persistent program per
              <span className="kbd">(batch, head)</span>, keeping the <span className="kbd">[64,64]</span> state tile
              resident and doing the LayerNorm-SiLU VJP in-register, with a hand-derived backward. The result: 26&ndash;44&times;
              on the forward, <strong>6.4&times; on the full mixer</strong> (120.7k &rarr; 769.8k tok/s), pulling Trellis
              from 0.04&times; to 0.26&times; of dense throughput and shrinking the gap to fla Gated DeltaNet from ~25&times;
              to <strong>~4&times;</strong>. The same kernel runs unmodified on the W7900 (ROCm) for an 8&ndash;12&times; win.
            </p>
            <ChartFrame title="Mixer throughput, fwd+bwd (A100, B8·T2048·d256·H4)"
              sub="Thousands of tokens/sec. The linear baselines (fla) beat dense attention; the fused Trellis kernel closes most — not all — of the gap. The ~4× residual is the genuine no-parallel-scan floor.">
              <BarChart data={THRU} layout="vertical" margin={{top:8, right:40, left:30, bottom:8}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.slate}/>
                <XAxis type="number" stroke="#94a3b8" label={{value:'k tok/s', position:'insideBottom', offset:-2, fill:'#94a3b8'}}/>
                <YAxis type="category" dataKey="mixer" stroke="#94a3b8" width={120} tick={{fontSize:11}}/>
                <Tooltip content={<Tip/>}/>
                <Bar dataKey="tps" name="k tok/s" radius={[0,3,3,0]}>
                  {THRU.map((d,i)=><Cell key={i} fill={d.kind==='linear'?C.green:(d.kind==='dense'?C.gray:(d.kind==='trellis'?C.violet:C.slate))}/>)}
                </Bar>
              </BarChart>
            </ChartFrame>
            <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4 text-sm text-gray-400">
              <strong className="text-gray-200">The decode flip.</strong> The kernel tax is a training/prefill cost. At
              <em> decode</em> the bounded fixed-size state is an advantage, not a tax &mdash; constant per-token cost, no
              growing cache to reread. That is the whole reason the family connects to knlp&rsquo;s decode and
              KV-compression work: a bounded state is the most aggressive KV compression there is.
            </div>
          </Section>

          {/* 7. paper claims */}
          <Section id="paper" kicker="The target" title="What the Trellis paper claims (verified)">
            <p>
              Pulled from the arXiv source (arXiv:2512.23852). Two facts to keep straight: Trellis and Gated DeltaNet
              are compared head-to-head <strong>only at 790M</strong>, and the 125M ablation has <strong>no Gated
              DeltaNet row</strong> at all. The paper&rsquo;s win is a scale claim, and it specifies no initialization for
              the inner step size or the forget gate &mdash; the same under-specification that sank an independent
              reimplementation of the group&rsquo;s earlier Titans model.
            </p>
            <div className="grid md:grid-cols-2 gap-4">
              <ChartFrame title="Paper Table 1 — 790M / 30B (C4)" sub="Trellis is best; Gated DeltaNet is the runner-up by 1.12 ppl." height={300}>
                <BarChart data={PAPER_790} layout="vertical" margin={{top:8, right:30, left:20, bottom:8}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.slate}/>
                  <XAxis type="number" stroke="#94a3b8" domain={[18,30]}/>
                  <YAxis type="category" dataKey="model" stroke="#94a3b8" width={110} tick={{fontSize:11}}/>
                  <Tooltip content={<Tip/>}/>
                  <Bar dataKey="ppl" name="val PPL" radius={[0,3,3,0]}>
                    {PAPER_790.map((d,i)=><Cell key={i} fill={d.best?C.violet:C.gray}/>)}
                  </Bar>
                </BarChart>
              </ChartFrame>
              <ChartFrame title="Paper Table 2 — 125M ablation (The Pile)" sub="No GatedDelta row here. Linear φ (delta rule) = 11.65; the nonlinear write is worth ~0.78 ppl." height={300}>
                <BarChart data={PAPER_125} layout="vertical" margin={{top:8, right:30, left:20, bottom:8}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.slate}/>
                  <XAxis type="number" stroke="#94a3b8" domain={[10,12]}/>
                  <YAxis type="category" dataKey="row" stroke="#94a3b8" width={130} tick={{fontSize:10}}/>
                  <Tooltip content={<Tip/>}/>
                  <Bar dataKey="ppl" name="val PPL" radius={[0,3,3,0]}>
                    {PAPER_125.map((d,i)=><Cell key={i} fill={d.kind==='full'?C.violet:(d.kind==='abl'?C.amber:C.gray)}/>)}
                  </Bar>
                </BarChart>
              </ChartFrame>
            </div>
            <p className="text-xs text-gray-500">
              Also Table 3 (1B, RULER / S-NIAH recall): Trellis 79.8 &gt; Gated DeltaNet 75.8 &gt; TTT 66.1 &gt; DeltaNet 57.9
              &gt; Mamba2 52.0, edge largest at long context. Smallest published config: 125M / 2.4B tokens.
            </p>
          </Section>

          {/* 8. forward ablations */}
          <Section id="next-ablations" kicker="TODO" title="Next: forward ablation ideas to evaluate">
            <p>
              The reconstruction is faithful in its bones but not yet in every detail, and the honest way to close the
              gap to the paper is to turn its specified choices back on and sweep the knobs it leaves unstated. The
              paper-faithful choices our defaults currently turn <em>off</em>, each individually unlikely to explain the
              whole gap but together plausibly much of it:
            </p>
            <ul className="list-disc pl-5 text-sm text-gray-400 space-y-1 my-2">
              <li>the paper&rsquo;s final value-readout activation <span className="kbd">y = φ(Mᵀr)</span> &mdash; default off;</li>
              <li>the paper&rsquo;s output block <span className="kbd">PostNorm &rarr; GeLU gate &rarr; projection</span> &mdash; we use a different order;</li>
              <li>the paper distinguishes <span className="kbd">f</span> (L2-normalized SiLU) from <span className="kbd">φ</span>; we use one LN-SiLU for both;</li>
              <li>the paper&rsquo;s write target is <span className="kbd">α = Softmax(Wₐx)</span>; our default is a plain linear projection;</li>
              <li>the inner step size <span className="kbd">γ</span> is fixed at 1e-2 and never swept &mdash; and the paper states no init for it.</li>
            </ul>
            <p>
              The single most informative experiment is the <strong>same-shell <span className="kbd">φ = identity</span>
              control</strong>: the same Trellis mixer, projections, two-pass shell, and parameter budget, with the
              nonlinearity removed so the model reduces to the delta rule. That isolates &ldquo;does the nonlinear write
              help?&rdquo; cleanly &mdash; external DeltaNet differs in shell, norm, gate, and conv and so is a strong
              <em> practical</em> baseline but not the clean causal control. The paper runs exactly that ablation
              (11.65 vs 10.87); we need the equivalent in our harness, which means adding an identity-<span className="kbd">φ</span>
              option (the config has none today).
            </p>
            <div className="bg-[#0b1220] border border-gray-800 rounded-lg p-4 text-sm text-gray-400 my-3">
              <strong className="text-gray-200">On scale.</strong> We are 26.6&times; below the paper&rsquo;s parameter
              floor but only 6.8&times; below its token floor, and at &asymp;75 tokens per non-embedding parameter we are
              if anything <em>over</em>-trained &mdash; so &ldquo;Trellis just needs more tokens&rdquo; is weak.
              &ldquo;Trellis needs more outer-model capacity before its extra flexibility pays off&rdquo; stays plausible,
              but it is a hypothesis: the paper shows nothing below 125M, so there is no evidence of a crossover from
              losing at small scale to winning at 125M.
            </div>
          </Section>

          {/* 9. next */}
          <Section id="next" kicker="What we&rsquo;d do next" title="The gate before any 125M scaling">
            <p>
              The bounded-memory family beats a matched dense Transformer at long context &mdash; that part is solid and
              is the keeper. Among the family, Gated DeltaNet is the standout at the scale we can train: simpler,
              lower-variance, exact-chunkable, faster, better quality. Our Trellis is the weakest member, but a
              <em> normal</em> below-crossover one, not a broken one. The next step is a cheap fidelity-closure sweep at
              small scale, not a leap to 125M:
            </p>
            <ol className="list-decimal pl-5 text-sm text-gray-400 space-y-1 my-2">
              <li>turn the paper-faithful defaults on (final activation, paper output path, <span className="kbd">β&asymp;0.99</span>) and add the identity-<span className="kbd">φ</span> control;</li>
              <li>screen <span className="kbd">φ</span> ∈ {'{'}LN-SiLU, L2-SiLU, SiLU, identity{'}'}, then <span className="kbd">γ</span> ∈ {'{'}3e-4 … 1e-1{'}'}, then chunk ∈ {'{'}b=1, 8, 16, 32{'}'} &mdash; sequentially;</li>
              <li>confirm the best two and the identity-<span className="kbd">φ</span> control over three seeds against fla Gated DeltaNet.</li>
            </ol>
            <p>
              Fund the 125M run only if Trellis beats its own identity-<span className="kbd">φ</span> control by
              &ge;0.02 nat across seeds, the stale-chunk penalty is &le;0.05 nat, and the gap to Gated DeltaNet drops below
              0.25 nat. A gap-versus-scale ladder (5M&rarr;20M&rarr;50M&rarr;125M at ~20 tok/param) decides whether the gap
              is closing toward a crossover before paying for the full reproduction. In parallel, the single
              highest-leverage move is non-compute: ask the authors for <span className="kbd">φ</span>,
              <span className="kbd"> f</span>, the <span className="kbd">γ</span>/<span className="kbd">β</span>
              parameterizations, the chunk size, and the tokenizer.
            </p>
          </Section>

          {/* footer */}
          <footer className="text-center text-gray-600 text-sm border-t border-gray-800 pt-8 mt-4">

              <a href="https://github.com/mcgrof/knlp/blob/main/docs/linear-attention.md" className="hover:text-gray-400">Full write-up</a>

              <a href="index.html" className="hover:text-gray-400">knlp</a>
            </p>
            <p>Preliminary &mdash; still being brought into line with the paper&rsquo;s original intent.</p>
          </footer>
